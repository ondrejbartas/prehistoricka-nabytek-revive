<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Diamond shape with 4 colored triangles -->
  <polygon points="20,2 38,20 20,38 2,20" fill="none"/>
  <!-- Top - Red -->
  <polygon points="20,2 38,20 20,20" fill="#E53935"/>
  <!-- Right - Yellow -->
  <polygon points="38,20 20,38 20,20" fill="#FDD835"/>
  <!-- Bottom - Green -->
  <polygon points="20,38 2,20 20,20" fill="#43A047"/>
  <!-- Left - Blue -->
  <polygon points="2,20 20,2 20,20" fill="#1E88E5"/>
</svg>