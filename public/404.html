<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <title>Pro-Int | Nábytek na míru – Český Brod</title>
    <script>
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      var repo = '/prehistoricka-nabytek-revive';
      if (path.startsWith(repo)) {
        path = path.slice(repo.length);
      }
      window.location.replace(
        repo + '/?p=' + encodeURIComponent(path + window.location.search)
      );
    </script>
  </head>
  <body></body>
</html>
